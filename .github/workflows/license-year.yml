name: Bump LICENSE year
on:
  schedule:
    - cron: "0 12 1 1 *"
  workflow_dispatch:
jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Bump year
        id: bump
        run: |
          year=$(date -u +%Y)
          sed -i -E "s/(Copyright \(c\) )[0-9]{4}/\1${year}/" LICENSE
          if git diff --quiet LICENSE; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "year=${year}" >> "$GITHUB_OUTPUT"
          fi
      - name: Open PR
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Bump LICENSE year to ${{ steps.bump.outputs.year }}"
          title: "Bump LICENSE year to ${{ steps.bump.outputs.year }}"
          body: "Annual LICENSE year bump."
          branch: bump-license-${{ steps.bump.outputs.year }}
          base: main
